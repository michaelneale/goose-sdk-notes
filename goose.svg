<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 710" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#8b949e"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="900" height="710" fill="#0d1117"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- KEY                                         -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="20" y="18" width="220" height="100" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="40" y="40" font-size="11" font-weight="700" fill="#e6edf3">Key</text>
  <line x1="40" y1="48" x2="220" y2="48" stroke="#30363d" stroke-width="1"/>
  <rect x="40" y="56" width="14" height="14" rx="3" fill="none" stroke="#7ee787" stroke-width="2"/>
  <text x="62" y="68" font-size="10" fill="#e6edf3">Goose core responsibility</text>
  <rect x="40" y="76" width="14" height="14" rx="3" fill="none" stroke="#58a6ff" stroke-width="2"/>
  <text x="62" y="88" font-size="10" fill="#e6edf3">Community &amp; 3rd party</text>
  <rect x="40" y="96" width="14" height="14" rx="3" fill="none" stroke="#ffa657" stroke-width="2"/>
  <text x="62" y="108" font-size="10" fill="#e6edf3">Open protocols &amp; standards</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LEGACY / FUTURE area (dashed)              -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="640" y="18" width="230" height="55" rx="10" fill="#161b22" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="660" y="28" width="90" height="34" rx="6" fill="#0d1117" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="705" y="50" text-anchor="middle" font-size="11" font-weight="600" fill="#8b949e">Mobile</text>
  <rect x="760" y="28" width="100" height="34" rx="6" fill="#0d1117" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="810" y="50" text-anchor="middle" font-size="11" font-weight="600" fill="#8b949e">Desktop 1.0</text>

  <!-- Arrow down to HTTP -->
  <line x1="755" y1="73" x2="755" y2="95" stroke="#8b949e" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- HTTP (dotted box) -->
  <rect x="710" y="95" width="90" height="34" rx="6" fill="#161b22" stroke="#8b949e" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="755" y="117" text-anchor="middle" font-size="11" font-weight="600" fill="#8b949e">HTTP</text>

  <!-- HTTP connects to Goose Core -->
  <line x1="755" y1="129" x2="550" y2="345" stroke="#8b949e" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- SURFACES: Chat, 2.0 Desktop, TUI           -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- 2.0 Desktop -->
  <rect x="310" y="170" width="160" height="40" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="390" y="195" text-anchor="middle" font-size="12" font-weight="600" fill="#58a6ff">2.0 Desktop</text>

  <!-- TUI -->
  <rect x="570" y="170" width="100" height="40" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="620" y="195" text-anchor="middle" font-size="12" font-weight="600" fill="#58a6ff">TUI</text>

  <!-- 2.0 Desktop --> ACP+ -->
  <line x1="390" y1="210" x2="450" y2="250" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- TUI --> ACP+ -->
  <line x1="620" y1="210" x2="530" y2="250" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ACP+ protocol bar                           -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="300" y="250" width="300" height="42" rx="8" fill="#2d1f00" stroke="#ffa657" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="276" text-anchor="middle" font-size="14" font-weight="700" fill="#ffa657">ACP+</text>

  <!-- ... (future experiences) --> ACP+ -->
  <rect x="120" y="200" width="100" height="34" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="5,3" filter="url(#shadow)"/>
  <text x="170" y="222" text-anchor="middle" font-size="14" font-weight="600" fill="#8b949e">…</text>
  <line x1="220" y1="217" x2="300" y2="258" stroke="#8b949e" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- GP <--> ACP+ -->
  <rect x="120" y="255" width="100" height="40" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="170" y="276" text-anchor="middle" font-size="12" font-weight="600" fill="#58a6ff">Goose</text>
  <text x="170" y="290" text-anchor="middle" font-size="12" font-weight="600" fill="#58a6ff">Perception</text>
  <line x1="220" y1="275" x2="300" y2="271" stroke="#8b949e" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- CLI direct to Goose Core                    -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="120" y="365" width="100" height="40" rx="8" fill="#161b22" stroke="#7ee787" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="170" y="390" text-anchor="middle" font-size="12" font-weight="600" fill="#7ee787">CLI</text>
  <line x1="220" y1="385" x2="300" y2="385" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ACP+ --> Goose Core -->
  <line x1="450" y1="292" x2="450" y2="335" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- GOOSE CORE                                  -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="300" y="335" width="300" height="160" rx="12" fill="#161b22" stroke="#7ee787" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="363" text-anchor="middle" font-size="15" font-weight="700" fill="#7ee787">Goose Core</text>
  <line x1="320" y1="373" x2="580" y2="373" stroke="#30363d" stroke-width="1"/>

  <text x="320" y="393" font-size="10" fill="#e6edf3">• Agent loop</text>
  <text x="320" y="409" font-size="10" fill="#e6edf3">• Sessions</text>
  <text x="320" y="425" font-size="10" fill="#e6edf3">• Extensions</text>
  <text x="320" y="441" font-size="10" fill="#e6edf3">• Security</text>
  <text x="440" y="393" font-size="10" fill="#e6edf3">• Sub-agents</text>
  <text x="440" y="409" font-size="10" fill="#e6edf3">• Context mgmt</text>
  <text x="440" y="425" font-size="10" fill="#e6edf3">• Scheduling</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- Goose Core outputs: MCP, Skills             -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Goose Core --> MCP -->
  <line x1="600" y1="375" x2="660" y2="375" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Goose Core --> Skills -->
  <line x1="600" y1="420" x2="660" y2="420" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Goose Core --> Plugins -->
  <line x1="600" y1="465" x2="660" y2="465" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="660" y="355" width="110" height="40" rx="8" fill="#161b22" stroke="#ffa657" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="715" y="380" text-anchor="middle" font-size="12" font-weight="600" fill="#ffa657">MCP</text>

  <rect x="660" y="400" width="110" height="40" rx="8" fill="#161b22" stroke="#ffa657" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="715" y="425" text-anchor="middle" font-size="12" font-weight="600" fill="#ffa657">Skills</text>

  <rect x="660" y="445" width="110" height="40" rx="8" fill="#161b22" stroke="#ffa657" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="715" y="470" text-anchor="middle" font-size="12" font-weight="600" fill="#ffa657">Plugins</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- Goose Core --> Providers                    -->
  <!-- ═══════════════════════════════════════════ -->
  <line x1="450" y1="495" x2="450" y2="540" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Providers -->
  <rect x="370" y="540" width="160" height="40" rx="8" fill="#161b22" stroke="#7ee787" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="565" text-anchor="middle" font-size="12" font-weight="600" fill="#7ee787">Providers</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- Provider backends: ACP, Local Models, Mesh  -->
  <!-- ═══════════════════════════════════════════ -->

  <line x1="400" y1="580" x2="280" y2="640" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="580" x2="450" y2="640" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="500" y1="580" x2="620" y2="640" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="220" y="640" width="110" height="40" rx="8" fill="#161b22" stroke="#ffa657" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="275" y="665" text-anchor="middle" font-size="12" font-weight="600" fill="#ffa657">ACP</text>

  <!-- Other Agents (behind, offset bottom-left) + Claude Code (front) --> ACP -->
  <rect x="42" y="658" width="130" height="40" rx="8" fill="#0d1117" stroke="#58a6ff" stroke-width="1.2"/>
  <text x="107" y="683" text-anchor="middle" font-size="10" font-weight="600" fill="#58a6ff">Other Agents</text>
  <rect x="62" y="640" width="130" height="40" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="127" y="665" text-anchor="middle" font-size="11" font-weight="600" fill="#58a6ff">Claude Code …</text>
  <line x1="192" y1="660" x2="220" y2="660" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="390" y="640" width="130" height="40" rx="8" fill="#161b22" stroke="#7ee787" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="455" y="665" text-anchor="middle" font-size="12" font-weight="600" fill="#7ee787">Local Models</text>

  <rect x="570" y="640" width="110" height="40" rx="8" fill="#161b22" stroke="#7ee787" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="625" y="665" text-anchor="middle" font-size="12" font-weight="600" fill="#7ee787">Mesh</text>

</svg>
